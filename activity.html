<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Logs - Backupro</title>
    <style>
        :root {
            --sidebar-width: 240px;
            --header-height: 60px;
            --bg-color: #f5f6f8;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #6c757d;
            --border-color: #e2e8f0;
            --primary-color: #4a5568;
            --accent-blue: #4285f4;
            --success-green: #10b981;
            --warning-orange: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: #1e293b;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-brand {
            height: var(--header-height);
            display: flex;
            align-items: center;
            padding: 0 24px;
            font-size: 1.25rem;
            font-weight: 700;
            border-bottom: 1px solid #334155;
        }

        .sidebar-menu {
            list-style: none;
            padding: 24px 0;
            margin: 0;
        }

        .sidebar-item a {
            display: flex;
            align-items: center;
            padding: 12px 24px;
            color: #cbd5e1;
            text-decoration: none;
            font-size: 14px;
        }

        .sidebar-item a:hover {
            background-color: #334155;
            color: #ffffff;
        }

        .sidebar-item.active a {
            background-color: #334155;
            color: #ffffff;
            border-left: 3px solid var(--accent-blue);
            padding-left: 21px;
        }

        .sidebar-section-label {
            padding: 16px 24px 8px;
            font-size: 11px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
        }

        /* --- HEADER & LAYOUT --- */
        .app-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .header {
            height: var(--header-height);
            background-color: #ffffff;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            flex-shrink: 0;
        }

        .breadcrumbs {
            font-size: 14px;
            color: var(--text-muted);
        }

        .breadcrumbs span {
            color: var(--text-main);
            font-weight: 500;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #cbd5e1;
        }

        .main-content {
            padding: 32px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 24px;
        }

        .page-title {
            margin: 0 0 8px 0;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .page-subtitle {
            margin: 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        /* --- ACTIVITY TABLE --- */
        .table-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        .filter-bar {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 16px;
            background: #fdfdfd;
        }

        .filter-select {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: white;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
        }

        .filter-select:focus {
            border-color: var(--accent-blue);
        }

        .activity-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .activity-table th,
        .activity-table td {
            text-align: left;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .activity-table th {
            color: var(--text-muted);
            font-weight: 600;
            background: #f8fafc;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .activity-table tr:hover td {
            background: #f8fafc;
        }

        .activity-table tr:last-child td {
            border-bottom: none;
        }

        .status-pill {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-success {
            background: #dcfce7;
            color: #166534;
        }

        .status-failed {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-running {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-warning {
            background: #fef3c7;
            color: #92400e;
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-brand">Backupro</div>
        <ul class="sidebar-menu">
            <li class="sidebar-item"><a href="overview.html">Overview</a></li>
            <div class="sidebar-section-label">Backup</div>
            <li class="sidebar-item"><a href="dashboard.html">Data Sources</a></li>
            <li class="sidebar-item active"><a href="activity.html">Activity Logs</a></li>
        </ul>
    </aside>

    <div class="app-container">
        <header class="header">
            <div class="breadcrumbs">
                System / <span id="breadcrumb-current">Activity Logs</span>
            </div>
            <div class="user-profile">
                <div class="avatar"></div>
                <span>Admin User</span>
                <button id="logout-btn"
                    style="margin-left: 10px; background: none; border: 1px solid var(--border-color); padding: 4px 8px; border-radius: 4px; cursor: pointer; color: var(--text-main); font-size: 12px;">Logout</button>
            </div>
        </header>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Activity Logs</h1>
                    <p class="page-subtitle">A complete audit trail of backups, restores, and synchronization tasks.</p>
                </div>
            </div>

            <div class="table-container">
                <div class="filter-bar">
                    <select class="filter-select">
                        <option value="all">All Sources</option>
                        <option value="google">Google Workspace</option>
                        <option value="microsoft">Microsoft 365</option>
                        <option value="local">Local Device</option>
                    </select>
                    <select class="filter-select">
                        <option value="all">All Statuses</option>
                        <option value="success">Success</option>
                        <option value="failed">Failed</option>
                        <option value="running">In Progress</option>
                    </select>
                    <select class="filter-select">
                        <option value="all">Last 7 Days</option>
                        <option value="30days">Last 30 Days</option>
                    </select>
                </div>

                <table class="activity-table">
                    <thead>
                        <tr>
                            <th>Task Detail</th>
                            <th>Account / Source</th>
                            <th>Status</th>
                            <th>Items Processed</th>
                            <th>Size</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="logs-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('is_authenticated') !== 'true') {
                window.location.href = 'login.html';
            }

            const logsBody = document.getElementById('logs-body');

            // Mock Activity Data
            const logs = [
                { task: 'Manual Backup (Outlook)', source: 'it-admin@company.com', type: 'Microsoft 365', status: 'success', items: '1,245', size: '1.2 GB', time: '10 mins ago' },
                { task: 'Auto Backup (Drive)', source: 'admin@company.com', type: 'Google Workspace', status: 'running', items: 'Processing...', size: '--', time: '25 mins ago' },
                { task: 'Manual Backup (Documents)', source: 'admin@local-machine.dev', type: 'Local Device', status: 'success', items: '342', size: '840 MB', time: '1 hour ago' },
                { task: 'Auto Backup (Photos)', source: 'admin@company.com', type: 'Google Workspace', status: 'failed', items: '0', size: '0 Bytes', time: '2 hours ago', error: 'Storage quota exceeded' },
                { task: 'Restore File', source: 'Q4_Budget_Draft.xlsx', type: 'Microsoft 365', status: 'success', items: '1', size: '4.8 MB', time: 'Yesterday, 4:15 PM' },
                { task: 'Auto Backup (All Services)', source: 'it-admin@company.com', type: 'Microsoft 365', status: 'success', items: '42,109', size: '14.2 GB', time: 'Yesterday, 2:00 AM' }
            ];

            function getStatusClass(status) {
                if (status === 'success') return 'status-success';
                if (status === 'failed') return 'status-failed';
                if (status === 'running') return 'status-running';
                return 'status-warning';
            }

            // Render Logs
            logsBody.innerHTML = logs.map(log => `
                <tr>
                    <td>
                        <strong style="color: var(--text-main); display: block; margin-bottom: 4px;">${log.task}</strong>
                        ${log.error ? `<span style="color: #ef4444; font-size: 12px;">Error: ${log.error}</span>` : ''}
                    </td>
                    <td>
                        <span style="display: block; margin-bottom: 2px;">${log.source}</span>
                        <span style="font-size: 12px; color: var(--text-muted);">${log.type}</span>
                    </td>
                    <td>
                        <span class="status-pill ${getStatusClass(log.status)}">${log.status.charAt(0).toUpperCase() + log.status.slice(1)}</span>
                    </td>
                    <td>${log.items}</td>
                    <td>${log.size}</td>
                    <td style="color: var(--text-muted);">${log.time}</td>
                </tr>
            `).join('');

            const logoutBtn = document.getElementById('logout-btn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    localStorage.removeItem('is_authenticated');
                    window.location.href = 'login.html';
                });
            }
        });
    </script>
</body>

</html>
